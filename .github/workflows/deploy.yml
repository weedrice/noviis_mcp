name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/noviis-mcp' }}
      SERVICE_NAME: ${{ secrets.DEPLOY_SERVICE_NAME || 'noviis-mcp.service' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Compile check
        run: python -m compileall .

      - name: Prepare SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$DEPLOY_PORT" "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Build release archive
        run: |
          tar \
            --exclude=.git \
            --exclude=.github \
            --exclude=.venv \
            --exclude=.env \
            --exclude=.env.local \
            --exclude=.tmp \
            --exclude=__pycache__ \
            --exclude=.pytest_cache \
            -czf release.tgz .

      - name: Upload release archive
        run: |
          scp -P "$DEPLOY_PORT" release.tgz "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/noviis-mcp-release.tgz"

      - name: Run remote deploy
        run: |
          ssh -p "$DEPLOY_PORT" "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "APP_DIR='$DEPLOY_PATH' SERVICE_NAME='$SERVICE_NAME' ARCHIVE_PATH='/tmp/noviis-mcp-release.tgz' bash -s" \
            < deploy/deploy.sh
